bindsym $mod+o mode "Application and Wallpaper Launcher"

mode "Application and Wallpaper Launcher" {
	bindsym $mod+l exec swaylock

	# Apps
	bindsym e exec emacs
	bindsym t exec telegram-desktop
	bindsym o exec obs
	bindsym g exec gimp
	bindsym p exec pavucontrol
	bindsym h exec $term -e htop
	bindsym z exec zathura
	bindsym c exec chromium

	# Wallpaper
	bindsym w exec swaybg -m fit -i $HOME/Pictures/wallpaper.jpg
	bindsym 1 exec swaybg -m fit -i $HOME/Pictures/wallpaper1.jpg
	bindsym 2 exec swaybg -m fit -i $HOME/Pictures/wallpaper2.jpg
	bindsym 3 exec swaybg -m fit -i $HOME/Pictures/wallpaper3.jpg
	bindsym 4 exec swaybg -m fit -i $HOME/Pictures/wallpaper4.jpg
	bindsym 5 exec swaybg -m fit -i $HOME/Pictures/wallpaper5.jpg
	bindsym 6 exec swaybg -m fit -i $HOME/Pictures/wallpaper6.jpg
	bindsym 7 exec swaybg -m fit -i $HOME/Pictures/wallpaper7.jpg
	bindsym 8 exec swaybg -m fit -i $HOME/Pictures/wallpaper8.jpg
	bindsym 9 exec swaybg -m fit -i $HOME/Pictures/wallpaper9.jpg
	bindsym 0 exec swaybg -m fit -i $HOME/Pictures/wallpaper10.jpg
	bindsym minus exec xsetroot -solid black

	bindsym Escape mode "default"
	bindsym Return mode "default"
}
